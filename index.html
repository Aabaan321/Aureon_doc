<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aureon Studio — Legal Syndicate Advisory Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --card: #1a1a25;
      --gold: #c9a84c;
      --gold-light: #e8d48b;
      --gold-grad: linear-gradient(135deg, #c9a84c, #e8d48b, #c9a84c);
      --text: #f0ece2;
      --text2: #a0a0b0;
      --muted: #6a6a7a;
      --border: rgba(201,168,76,0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: 30%; left: 50%;
      width: 600px; height: 600px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 40px 30px;
      position: relative;
      z-index: 1;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4em;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 60px;
      background: var(--gold-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      margin-left: 2px;
      vertical-align: super;
    }
    .divider {
      width: 60px; height: 1px;
      background: var(--gold-grad);
      margin: 0 auto 40px;
    }
    .client-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7em;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2em;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 12px;
    }
    .subtitle {
      color: var(--text2);
      font-size: 0.95em;
      font-weight: 300;
      margin-bottom: 50px;
    }
    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }
    .nav-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 320px;
      padding: 16px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 0.95em;
      font-weight: 500;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .nav-link::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.05), transparent);
      transition: left 0.5s ease;
    }
    .nav-link:hover::before { left: 100%; }

    .nav-link.primary {
      background: var(--gold-grad);
      color: var(--bg);
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(201,168,76,0.2);
    }
    .nav-link.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(201,168,76,0.35);
    }
    .nav-link.secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .nav-link.secondary:hover {
      border-color: rgba(201,168,76,0.4);
      transform: translateY(-2px);
    }

    .nav-link .arrow {
      font-size: 0.85em;
      transition: transform 0.3s ease;
    }
    .nav-link:hover .arrow { transform: translateX(4px); }

    .footer {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72em;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
    }
    .footer a {
      color: var(--gold);
      text-decoration: none;
    }

    @media (max-width: 480px) {
      .container { padding: 30px 20px; }
      h1 { font-size: 1.6em; }
      .nav-link { width: 100%; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">AUREON STUDIO<span class="logo-dot"></span></div>
  <div class="divider"></div>
  <p class="client-label">Client Portal</p>
  <h1>Legal Syndicate Advisory</h1>
  <p class="subtitle">Website Evaluation & Modernization Project</p>

  <div class="nav-links">
    <a href="proposal.html" class="nav-link primary">
      View Full Proposal <span class="arrow">→</span>
    </a>
    <a href="progress.html" class="nav-link secondary">
      Project Progress & Timeline <span class="arrow">→</span>
    </a>
  </div>
</div>

<div class="footer">
  <a href="https://aureon-studio-olive.vercel.app">aureon-studio-olive.vercel.app</a> · aabaanrahil@gmail.com<br>
  © 2026 Aureon Studio — Dubai, UAE
</div>

</body>
</html>
