<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Access Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #05080f;
      --card-bg: #0a0f1a;
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.7);
      --border-light: rgba(255, 255, 255, 0.08);
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --gradient-primary: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --gradient-glow: 0 4px 20px rgba(59, 130, 246, 0.3);
      --font-sans: 'Inter', sans-serif;
    }

    body { 
      background: var(--bg-color); 
      color: var(--text-main); 
      font-family: var(--font-sans); 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0;
      background-image: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .login-card { 
      background: var(--card-bg); 
      border: 1px solid var(--border-light); 
      padding: 40px; 
      border-radius: 16px; 
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s;
    }

    .login-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }

    .login-logo {
      font-size: 1.4em;
      font-weight: 700;
      margin-bottom: 30px;
      letter-spacing: -0.02em;
    }
    .login-logo span { color: var(--accent-blue); }

    .login-card p { 
      color: var(--text-muted); 
      font-size: 0.9em; 
      margin-bottom: 24px; 
      line-height: 1.5;
    }

    input { 
      width: 100%; 
      padding: 14px 16px; 
      margin-bottom: 16px; 
      background: rgba(255,255,255,0.03); 
      border: 1px solid var(--border-light); 
      color: #fff; 
      border-radius: 8px; 
      box-sizing: border-box; 
      font-family: var(--font-sans);
      font-size: 0.95em;
      transition: border-color 0.3s, background 0.3s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent-blue);
      background: rgba(255,255,255,0.05);
    }

    input::placeholder {
      color: rgba(255,255,255,0.3);
    }

    button { 
      width: 100%; 
      padding: 14px; 
      background: var(--gradient-primary); 
      color: #fff; 
      border: none; 
      border-radius: 8px; 
      font-weight: 600; 
      font-size: 1em;
      cursor: pointer; 
      box-shadow: var(--gradient-glow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(59, 130, 246, 0.4);
    }

    .error { 
      color: #ef4444; 
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 10px;
      border-radius: 8px;
      font-size: 0.85em; 
      margin-bottom: 16px; 
      display: none; 
    }

    .footer-note {
      text-align: center;
      margin-top: 30px;
      font-size: 0.75em;
      color: rgba(255,255,255,0.3);
    }

    .shake {
      animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes shake {
      10%, 90% { transform: translate3d(-2px, 0, 0); }
      20%, 80% { transform: translate3d(4px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
      40%, 60% { transform: translate3d(8px, 0, 0); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card" id="loginCard">
      <div class="login-logo">Client<span>Gateway</span></div>
      <p>Enter your assigned credentials to securely access your project workspace.</p>
      
      <div id="errorMsg" class="error">Invalid Company ID or Access Code.</div>
      
      <input type="text" id="companyId" placeholder="Company ID (e.g., LSA-2026)" autocomplete="off">
      <input type="password" id="password" placeholder="Access Code">
      
      <button onclick="loginClient()">Access Workspace</button>
    </div>
    <div class="footer-note">Secure Client Portal Engine V1.0</div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
